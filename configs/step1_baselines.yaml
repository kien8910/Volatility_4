data:
  panel_path: data/processed/fintexts_step0_panel.parquet
  split_manifest_path: data/splits/split_manifest.csv
  expanding_folds_path: data/splits/expanding_folds.csv
  tickers:
    - ADI
    - AMAT
    - AMD
    - AVGO
    - INTC
    - KLAC
    - LRCX
    - MU
    - NVDA
    - QCOM
    - TXN
  group_name: Industry-level Semiconductor

target:
  primary: logvol_gk
  epsilon: 1.0e-12
  horizons: [1, 5, 10, 22]
  annualize: false

features:
  har_windows: [1, 5, 22]
  lookbacks: [22, 44, 66]

models:
  ar_lags: [1, 5, 10, 22]
  ridge_alpha: [0.001, 0.01, 0.1, 1, 10, 100]
  mlp:
    enabled: true
    lookbacks: [22]
    hidden_layer_sizes: [64, 32]
    dropout: 0.1
    max_iter: 40
    seeds: [42]
  dlinear:
    enabled: true
    lookbacks: [22]
    max_epochs: 120
    patience: 12
    learning_rate: 0.01
    seeds: [41, 42, 43]
  garch:
    enabled: true
    families: [GARCH, GJR-GARCH]
    distributions: [normal, t]

evaluation:
  primary_metric: qlike
  spike_quantile: 0.90
  exp_clip: [-60, 60]
  bootstrap_blocks: 5
  bootstrap_samples: 500

output:
  tables_dir: results/tables
  figures_dir: results/figures
  report_path: reports/step1_baseline_report.md
